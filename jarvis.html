<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Jarvis Tecnology</title>
</head>
<body>
<header>
    <h1>Tienda con Jarvis</h1>
</header>

<section>
    <h2>Productos disponibles</h2>
    <div id="productos"></div>
</section>

<footer>
    <p>Asistente inteligente activo 🤖</p>
</footer>

<script>
fetch("http://127.0.0.1:5000/productos")
.then(res => res.json())
.then(data => {
    let contenedor = document.getElementById("productos")

    data.forEach(p => {
        contenedor.innerHTML += `
            <div class="producto">
                <h3>${p.nombre}</h3>
                <p>💲 ${p.precio}</p>
                <p>${p.categoria}</p>
            </div>
        `
    })
})
</script>

</body>
</html>
